services:
  api:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    container_name: agenda-assessoria-api
    working_dir: /aplicacao/backend
    volumes:
      - ./backend:/aplicacao/backend
      - backend_vendor:/aplicacao/backend/vendor
      - composer_cache:/tmp/composer-cache
    ports:
      - "${API_PORTA:-8000}:8000"
    environment:
      APP_AMBIENTE: "${APP_AMBIENTE:-local}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      AUTO_SEED: "${AUTO_SEED:-true}"
      TZ: "${TZ:-America/Cuiaba}"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: "${POSTGRES_DB:-agenda_assessoria}"
      DB_USERNAME: "${POSTGRES_USER:-agenda}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-agenda}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/saude >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - agenda

  web:
    build:
      context: .
      dockerfile: infra/docker/frontend/Dockerfile
    container_name: agenda-assessoria-web
    working_dir: /aplicacao/frontend
    volumes:
      - ./frontend:/aplicacao/frontend
      - frontend_node_modules:/aplicacao/frontend/node_modules
      - frontend_angular_cache:/aplicacao/frontend/.angular
      - npm_cache:/root/.npm
    ports:
      - "${WEB_PORTA:-4200}:4200"
    environment:
      TZ: "${TZ:-America/Cuiaba}"
      CHOKIDAR_USEPOLLING: "true"
      NG_CLI_ANALYTICS: "false"
      NPM_CONFIG_CACHE: /root/.npm
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - agenda

  db:
    image: postgres:16.3-alpine
    container_name: agenda-assessoria-db
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-agenda_assessoria}"
      POSTGRES_USER: "${POSTGRES_USER:-agenda}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-agenda}"
      TZ: "${TZ:-America/Cuiaba}"
    ports:
      - "${DB_PORTA:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agenda

volumes:
  postgres_data:
  backend_vendor:
  composer_cache:
  frontend_node_modules:
  frontend_angular_cache:
  npm_cache:

networks:
  agenda:
    driver: bridge
