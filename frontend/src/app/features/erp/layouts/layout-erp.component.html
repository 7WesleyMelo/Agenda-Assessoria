<div class="layout-erp">
  <aside class="barra-lateral">
    <div class="marca">
      <p class="marca__rotulo">Agenda</p>
      <strong>ERP Assessoria</strong>
    </div>

    <nav class="menu">
      <a routerLink="/erp" routerLinkActive="ativo" [routerLinkActiveOptions]="{ exact: true }">
        Painel inicial
      </a>
      <a routerLink="/erp/cadastros" routerLinkActive="ativo">Cadastros</a>
      <a routerLink="/erp/financeiro" routerLinkActive="ativo">Financeiro</a>
      <a routerLink="/erp/relatorios" routerLinkActive="ativo">Relatorios</a>
      <a routerLink="/erp/configuracoes" routerLinkActive="ativo">Configuracoes</a>
    </nav>

    <button type="button" class="botao-sair" (click)="sair()">Sair</button>
  </aside>

  <div class="conteudo">
    <header class="topo">
      <div>
        <p class="topo__legenda">Ambiente autenticado</p>
        <h1>{{ sessaoService.usuario()?.nome }}</h1>
      </div>

      <div class="menu-usuario">
        <button type="button" class="menu-usuario__gatilho" (click)="alternarDropdown($event)">
          <div class="menu-usuario__info">
            <strong>{{ sessaoService.usuario()?.cargo }}</strong>
            <span>{{ sessaoService.usuario()?.email }}</span>
          </div>

          <img
            class="menu-usuario__avatar"
            [src]="avatarUsuario()"
            [alt]="'Foto do usuario ' + (sessaoService.usuario()?.nome ?? '')"
          />
        </button>

        @if (dropdownAberto()) {
          <div class="menu-usuario__dropdown" (click)="$event.stopPropagation()">
            <div class="menu-usuario__cabecalho">
              <img
                class="menu-usuario__avatar menu-usuario__avatar--grande"
                [src]="avatarUsuario()"
                [alt]="'Foto do usuario ' + (sessaoService.usuario()?.nome ?? '')"
              />

              <div>
                <strong>{{ sessaoService.usuario()?.nome }}</strong>
                <span>{{ sessaoService.usuario()?.cargo }}</span>
              </div>
            </div>

            <button type="button" class="menu-usuario__acao" (click)="abrirPerfil($event)">
              Perfil
            </button>
            <button type="button" class="menu-usuario__acao menu-usuario__acao--sair" (click)="sair()">
              Logout
            </button>
          </div>
        }
      </div>
    </header>

    <main class="conteudo__principal">
      <router-outlet />
    </main>
  </div>
</div>
