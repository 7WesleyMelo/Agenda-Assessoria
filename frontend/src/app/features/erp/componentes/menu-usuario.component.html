<div class="menu-usuario">
  <button
    type="button"
    class="menu-usuario__gatilho"
    aria-haspopup="menu"
    [attr.aria-expanded]="dropdownAberto()"
    [attr.aria-controls]="menuId"
    aria-label="Abrir menu do usuário"
    (click)="alternarDropdown($event)"
  >
    <div class="menu-usuario__info">
      <strong>{{ usuario()?.cargo }}</strong>
      <span>{{ usuario()?.email }}</span>
    </div>

    <app-avatar-usuario [nome]="usuario()?.nome ?? null" />
  </button>

  @if (dropdownAberto()) {
    <div
      [id]="menuId"
      class="menu-usuario__dropdown"
      role="menu"
      aria-label="Menu do usuário"
      (click)="$event.stopPropagation()"
    >
      <div class="menu-usuario__cabecalho">
        <app-avatar-usuario [nome]="usuario()?.nome ?? null" [grande]="true" />

        <div>
          <strong>{{ usuario()?.nome }}</strong>
          <span>{{ usuario()?.cargo }}</span>
        </div>
      </div>

      <button type="button" class="menu-usuario__acao" role="menuitem" (click)="abrirPerfil($event)">Perfil</button>
      <button type="button" class="menu-usuario__acao menu-usuario__acao--sair" (click)="solicitarSaida()">
        Sair
      </button>
    </div>
  }
</div>
