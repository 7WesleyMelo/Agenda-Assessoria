<app-ui-modal [aberto]="!!usuario()" ariaLabel="Confirmação de exclusão de usuário" (fechar)="cancelarModal()">
  @if (usuario(); as usuarioSelecionado) {
    <section class="modal">
      <p class="modal__legenda">Confirmação de exclusão</p>
      <h3>Excluir {{ usuarioSelecionado.nome }}?</h3>
      <p>
        Esta ação remove o usuário do cadastro. Se ele for o usuário autenticado, a API vai bloquear a
        exclusão automaticamente.
      </p>

      @if (mensagemErro()) {
        <p class="mensagem-erro">{{ mensagemErro() }}</p>
      }

      <div class="modal__acoes">
        <button type="button" class="ui-botao ui-botao--secundario" (click)="cancelarModal()">Cancelar</button>
        <button
          type="button"
          class="ui-botao ui-botao--perigo"
          [disabled]="excluindo()"
          [attr.aria-busy]="excluindo()"
          (click)="confirmarExclusao()"
        >
          {{ excluindo() ? 'Excluindo...' : 'Confirmar exclusão' }}
        </button>
      </div>
    </section>
  }
</app-ui-modal>
