<section class="cadastros">
  <header class="cabecalho">
    <p class="cabecalho__legenda">Módulo de cadastros</p>
    <h2>Base operacional do ERP</h2>
    <p class="cabecalho__descricao">
      Organize os registros principais do sistema e mantenha a operação preparada para evoluir por
      módulos.
    </p>
  </header>

  <section class="grade">
    @for (modulo of modulos; track modulo.titulo) {
      <a class="card" [routerLink]="modulo.rota">
        <strong>{{ modulo.titulo }}</strong>
        <span>{{ modulo.descricao }}</span>
        <small>{{ modulo.acao }}</small>
      </a>
    }
  </section>
</section>
