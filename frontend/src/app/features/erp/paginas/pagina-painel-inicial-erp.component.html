@if (carregando()) {
  <section class="estado estado--carregando">
    <p>Carregando painel inicial do ERP...</p>
  </section>
} @else if (mensagemErro()) {
  <section class="estado estado--erro">
    <p>{{ mensagemErro() }}</p>
    <button type="button" (click)="carregar()">Tentar novamente</button>
  </section>
} @else if (painel(); as dados) {
  <section class="painel">
    <app-hero-painel [saudacao]="dados.saudacao" [resumo]="resumoExecutivo()" />
    <app-indicadores-painel [indicadores]="dados.indicadores" />
    <app-listas-contexto-painel [menuPrincipal]="dados.menu_principal" [atalhos]="dados.atalhos" />
  </section>
}
