name: Validacao

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Instalar dependências do Composer
        run: composer install --no-interaction --prefer-dist

      - name: Preparar ambiente
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Executar lint do backend
        run: composer lint

      - name: Executar testes do backend
        run: composer test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Configurar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Exportar binário do Chrome
        run: echo "CHROME_BIN=$(which chrome)" >> $GITHUB_ENV

      - name: Executar lint do frontend
        run: npm run lint

      - name: Executar testes do frontend
        run: npm run test:ci

      - name: Gerar build do frontend
        run: npm run build
